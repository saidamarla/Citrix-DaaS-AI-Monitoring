services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: citrix-postgres
    environment:
      POSTGRES_USER: citrix_user
      POSTGRES_PASSWORD: citrix_password
      POSTGRES_DB: citrix_daas_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U citrix_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - citrix_network

  # Ollama for AI/LLM
  ollama:
    image: ollama/ollama:latest
    container_name: citrix-ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - citrix_network
    deploy:
      resources:
        limits:
          memory: 2G

  # Backend API
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: citrix-backend
    environment:
      DATABASE_URL: postgresql://citrix_user:citrix_password@postgres:5432/citrix_daas_db
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      COLLECTION_INTERVAL_SECONDS: ${COLLECTION_INTERVAL_SECONDS:-60}
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: mistral
      CITRIX_CLIENT_ID: ${CITRIX_CLIENT_ID:-}
      CITRIX_CLIENT_SECRET: ${CITRIX_CLIENT_SECRET:-}
      CITRIX_CUSTOMER_ID: ${CITRIX_CUSTOMER_ID:-}
      CITRIX_API_URL: ${CITRIX_API_URL:-https://api.cloud.com}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - citrix_network
    restart: unless-stopped

  # Frontend Web UI
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: citrix-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/index.html"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - citrix_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  ollama_data:
    driver: local

networks:
  citrix_network:
    driver: bridge
